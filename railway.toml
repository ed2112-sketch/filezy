[build]
builder = "NIXPACKS"

[build.nixpacks]
nixPkgs = ["nodejs_22"]

[build.nixpacks.env]
NIXPACKS_NODE_VERSION = "22"

[deploy]
startCommand = "npx prisma db push && npm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
